aid: bytebase
url: https://raw.githubusercontent.com/api-evangelist/bytebase/refs/heads/main/apis.yml
name: Bytebase
kind: company
description: Bytebase is a database DevOps and CI/CD platform - the GitOps-style control
  plane for schema change, migration, and access management across MySQL, PostgreSQL,
  and many other engines. Every action in the web console is backed by a documented
  API exposed as both Connect/gRPC and RESTful HTTP (gRPC transcoding), authenticated
  with a service-account Bearer token. Bytebase ships as free, self-hostable open
  source (OSS) with paid Pro and Enterprise tiers.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Database
- DevOps
- Schema Migration
- CI/CD
- DevSecOps
created: '2026-06-21'
modified: '2026-06-21'
